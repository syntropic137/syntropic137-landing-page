<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1500" />
  <title>Syntropic137 Twitter Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700&display=swap"
    rel="stylesheet"
  />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1500px;
      height: 500px;
      overflow: hidden;
      background: #0F0F1A;
    }

    .banner {
      position: relative;
      width: 1500px;
      height: 500px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Gradient background — matches site radial glows ── */
    .banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 500px at 50% 110%, rgba(77, 128, 255, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 25% 30%, rgba(23, 46, 117, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 500px 350px at 80% 20%, rgba(51, 102, 230, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 300px 300px at 60% 80%, rgba(26, 128, 179, 0.1) 0%, transparent 50%);
      z-index: 0;
    }

    /* ── Blueprint grid — matches site ── */
    .banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(23, 46, 117, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 46, 117, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }

    /* ── Glow orbs ── */
    .glow-1, .glow-2, .glow-3 {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
    }

    .glow-1 {
      width: 500px;
      height: 500px;
      background: rgba(77, 128, 255, 0.12);
      top: -150px;
      left: 200px;
    }

    .glow-2 {
      width: 400px;
      height: 400px;
      background: rgba(51, 102, 230, 0.1);
      bottom: -100px;
      right: 250px;
    }

    .glow-3 {
      width: 300px;
      height: 300px;
      background: rgba(26, 128, 179, 0.08);
      top: 50px;
      right: 100px;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      transform: scale(1.2);
      transform-origin: center center;
    }

    /* ── Eyebrow badge — matches .hero-eyebrow exactly ── */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 22px;
      border-radius: 100px;
      border: 1px solid rgba(77, 128, 255, 0.2);
      background: rgba(77, 128, 255, 0.08);
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4D80FF;
      box-shadow: 0 8px 24px -4px rgba(77, 128, 255, 0.35), 0 2px 8px -2px rgba(77, 128, 255, 0.2);
    }

    .eyebrow svg {
      color: #4D80FF;
      flex-shrink: 0;
    }

    .eyebrow-sep {
      width: 1px;
      height: 16px;
      background: rgba(77, 128, 255, 0.3);
    }

    /* ── Headline — Orbitron 700, matches .hero h1 ── */
    h1 {
      font-family: 'Orbitron', system-ui, sans-serif;
      font-size: 96px;
      font-weight: 700;
      color: #E6F2FF;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-align: center;
    }

    h1 .accent {
      color: #4D80FF;
    }

    h1 {
      filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.6)) drop-shadow(0 0 40px rgba(77, 128, 255, 0.25));
    }

    /* ── Subtitle — matches .hero-subtitle ── */
    .tagline {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 29px;
      font-weight: 500;
      color: rgba(230, 242, 255, 0.7);
      letter-spacing: 0.01em;
      text-align: center;
    }

    .tagline .gold {
      font-weight: 600;
      background: linear-gradient(135deg, #D4A056, #F0D48A, #E8C36A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 12px rgba(232, 195, 106, 0.35)) drop-shadow(0 0 30px rgba(212, 160, 86, 0.15));
    }

    /* ── Decorative side lines ── */
    .deco-line {
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }

    .deco-line-left {
      left: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 200px;
      background: linear-gradient(to bottom, transparent, rgba(77, 128, 255, 0.2), transparent);
    }

    .deco-line-right {
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 200px;
      background: linear-gradient(to bottom, transparent, rgba(77, 128, 255, 0.2), transparent);
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="glow-3"></div>

    <div class="deco-line deco-line-left"></div>
    <div class="deco-line deco-line-right"></div>

    <div class="content">
      <div class="eyebrow">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>
        <span>MIT</span>
        <span class="eyebrow-sep"></span>
        <span>Agentic Engineering Platform</span>
      </div>

      <h1>IDEs are <span class="accent">dead.</span></h1>

      <p class="tagline">
        Get out of the loop. <span class="gold">Get into orchestration.</span>
      </p>
    </div>
  </div>
</body>
</html>
